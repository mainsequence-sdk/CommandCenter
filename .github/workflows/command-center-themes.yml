name: Command Center Themes Package

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  pull_request:
    paths:
      - "packages/command-center-themes/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/command-center-themes.yml"
  push:
    branches:
      - main
    paths:
      - "packages/command-center-themes/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/command-center-themes.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: command-center-themes-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5.0.1

      - name: Setup Node
        uses: actions/setup-node@v5.0.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check theme package
        run: npm run themes:check

      - name: Build theme package
        run: npm run themes:build

      - name: Pack theme package
        run: npm pack --workspace @mainsequence/command-center-themes

      - name: Upload package tarball
        uses: actions/upload-artifact@v4.6.2
        with:
          name: command-center-themes-package
          path: mainsequence-command-center-themes-*.tgz

  publish:
    name: Publish Package
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5.0.1

      - name: Setup Node
        uses: actions/setup-node@v5.0.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build theme package
        run: npm run themes:build

      - name: Check published version
        id: published
        run: |
          package_name="$(node -p "require('./packages/command-center-themes/package.json').name")"
          package_version="$(node -p "require('./packages/command-center-themes/package.json').version")"
          if npm view "${package_name}@${package_version}" version >/dev/null 2>&1; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish theme package
        if: env.NODE_AUTH_TOKEN != '' && steps.published.outputs.already_published == 'false'
        run: npm publish --workspace @mainsequence/command-center-themes --access public --provenance

      - name: Report skipped publish
        if: env.NODE_AUTH_TOKEN == '' || steps.published.outputs.already_published == 'true'
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "NPM_TOKEN is not configured; skipping publish."
          else
            echo "Package version is already published; skipping publish."
          fi
